name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Build the Docker Image
      run: docker build . --file Dockerfile --tag chicken-disease-classifier:latest

    - name: Log in to GitHub Container Registry (Free for life)
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Tag and Push Docker Image to GHCR
      run: |
        # Docker requires lowercase repository names
        REPO_NAME=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
        IMAGE_ID=ghcr.io/$REPO_NAME/chicken-disease-classifier
        
        docker tag chicken-disease-classifier:latest $IMAGE_ID:latest
        docker push $IMAGE_ID:latest
