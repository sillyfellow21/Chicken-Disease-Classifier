<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chicken Disease Classifier</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f6f9;
            color: #1a1a2e;
            font-family: system-ui, -apple-system, sans-serif;
            padding: 20px;
        }
        .container {
            max-width: 800px;
        }
        .card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            margin-bottom: 20px;
            background-color: #ffffff;
        }
        .header {
            background-color: #f4f6f9;
            border-bottom: 2px solid #e94560;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        .btn-custom {
            background-color: #e94560;
            color: white;
            border: none;
            border-radius: 6px;
        }
        .btn-custom:hover {
            background-color: #d13d56;
        }
        .drop-zone {
            border: 2px dashed #ccc;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .drop-zone:hover, .drop-zone.dragover {
            background-color: #f8f9fa;
            border-color: #e94560;
        }
        #preview {
            max-width: 100%;
            max-height: 200px;
            margin-top: 15px;
            border-radius: 8px;
            display: none;
        }
        .result-box {
            font-size: 1.1rem;
            padding: 20px;
            background-color: #f8f9fa;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header d-flex justify-content-between align-items-center">
        <h2>🐔 Chicken Disease Classifier</h2>
        <span class="badge bg-secondary">v1.0</span>
    </div>

    <div class="row">
        <div class="col-md-7">
            <div class="card p-4 h-100">
                <div class="drop-zone" id="drop-zone">
                    <p class="mb-2">Drag & Drop Image Here</p>
                    <p class="text-muted small">or</p>
                    <input type="file" id="file-input" class="d-none" accept="image/*">
                    <button class="btn btn-outline-secondary btn-sm" onclick="document.getElementById('file-input').click()">Browse Files</button>
                    <img id="preview" alt="Image preview">
                </div>
                
                <button class="btn btn-custom w-100 mt-3" id="predict-btn" disabled>Predict Disease</button>
            </div>
        </div>

        <div class="col-md-5">
            <div class="card p-4 h-100">
                <h5 class="mb-3">Prediction</h5>
                <hr>
                <div class="result-box">
                    <div class="d-flex justify-content-between mb-2">
                        <span class="text-muted">Class:</span>
                        <span id="result-class" class="fw-bold">--</span>
                    </div>
                    <div class="d-flex justify-content-between">
                        <span class="text-muted">Confidence:</span>
                        <span id="result-conf" class="fw-bold">--</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="card p-4 mt-2">
        <h5 class="mb-3">Training Dashboard</h5>
        <div class="row align-items-center">
            <div class="col-md-4">
                <button class="btn btn-dark w-100" id="train-btn">Start Training Run</button>
            </div>
            <div class="col-md-8">
                <div class="d-flex justify-content-between">
                    <div>
                        <span class="text-muted small">Status: </span>
                        <span id="train-status" class="fw-bold text-success">idle</span>
                    </div>
                    <div>
                        <span class="text-muted small">Loss: </span>
                        <span class="fw-bold" id="train-loss">--</span>
                    </div>
                    <div>
                        <span class="text-muted small">Accuracy: </span>
                        <span class="fw-bold" id="train-acc">--</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const fileInput = document.getElementById('file-input');
    const dropZone = document.getElementById('drop-zone');
    const preview = document.getElementById('preview');
    const predictBtn = document.getElementById('predict-btn');
    const trainBtn = document.getElementById('train-btn');
    
    let currentFile = null;

    // Handle Drag & Drop
    dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.classList.add('dragover');
    });

    dropZone.addEventListener('dragleave', () => {
        dropZone.classList.remove('dragover');
    });

    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        if (e.dataTransfer.files.length) {
            handleFile(e.dataTransfer.files[0]);
        }
    });

    // Handle File Input
    fileInput.addEventListener('change', (e) => {
        if (e.target.files.length) {
            handleFile(e.target.files[0]);
        }
    });

    function handleFile(file) {
        if (!file.type.startsWith('image/')) return;
        currentFile = file;
        const reader = new FileReader();
        reader.onload = (e) => {
            preview.src = e.target.result;
            preview.style.display = 'block';
            predictBtn.disabled = false;
        };
        reader.readAsDataURL(file);
    }

    // Prediction
    predictBtn.addEventListener('click', async () => {
        if (!currentFile) return;
        predictBtn.disabled = true;
        predictBtn.textContent = 'Analyzing...';
        
        try {
            const formData = new FormData();
            formData.append('file', currentFile);
            
            const response = await fetch('/api/predict', {
                method: 'POST',
                body: formData
            });
            const data = await response.json();
            
            document.getElementById('result-class').textContent = data.class;
            document.getElementById('result-class').style.color = data.class === 'Healthy' ? '#28a745' : '#dc3545';
            document.getElementById('result-class').innerHTML += data.class === 'Healthy' ? ' ✓' : ' ⚠';
            document.getElementById('result-conf').textContent = data.confidence;
            
        } catch (error) {
            alert('Prediction failed. Is the server running?');
        } finally {
            predictBtn.disabled = false;
            predictBtn.textContent = 'Predict Disease';
        }
    });

    // Training
    trainBtn.addEventListener('click', async () => {
        try {
            await fetch('/api/train', { method: 'POST' });
            pollTrainingStatus();
        } catch (error) {
            alert('Failed to start training.');
        }
    });

    async function pollTrainingStatus() {
        trainBtn.disabled = true;
        document.getElementById('train-status').textContent = 'running...';
        document.getElementById('train-status').classList.replace('text-success', 'text-warning');
        
        const interval = setInterval(async () => {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                
                if (data.status !== 'running') {
                    clearInterval(interval);
                    trainBtn.disabled = false;
                    document.getElementById('train-status').textContent = data.status;
                    document.getElementById('train-status').classList.replace('text-warning', 'text-success');
                    
                    if (data.metrics?.accuracy) {
                        document.getElementById('train-loss').textContent = data.metrics.loss.toFixed(4);
                        document.getElementById('train-acc').textContent = (data.metrics.accuracy * 100).toFixed(1) + '%';
                    }
                }
            } catch (e) {
                console.error(e);
            }
        }, 2000);
    }
</script>
</body>
</html>
